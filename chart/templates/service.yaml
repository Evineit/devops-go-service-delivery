apiVersion: v1
kind: Service
metadata:
  name: {{ include "user-service.fullname" . | default .Chart.Name }}
spec:
  selector:
    app: {{ include "user-service.name" . | default .Chart.Name }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  type: ClusterIP
