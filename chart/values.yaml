replicaCount: 2

image:
  repository: myrepo/devops-go-service-delivery
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

readinessProbe:
  path: /health
  port: 8080

livenessProbe:
  path: /health
  port: 8080
